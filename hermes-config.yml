# Hermes Agent Configuration
# Forge 2 Qualifier — Akash Kapoor
# Secrets stripped. Copy to ~/.hermes/config.yml and fill in real values from .env.example.

model:
  provider: groq
  model: openai/gpt-oss-120b
  base_url: https://api.groq.com/openai/v1
  api_key: ${GROQ_API_KEY}       # from .env / environment
  max_tokens: 8192
  temperature: 0.3

fallback_models:
  - provider: gemini
    model: gemini-2.5-flash
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    api_key: ${GEMINI_API_KEY}
  - provider: ollama
    model: qwen2.5-coder:7b
    base_url: http://localhost:11434/v1
    api_key: ollama

memory:
  enabled: true
  backend: file
  path: ~/.hermes/memories/

skills_path: ./skills

channels:
  slack:
    enabled: true
    mode: socket
    app_token: ${SLACK_APP_TOKEN}    # xapp-... scope: connections:write
    bot_token: ${SLACK_BOT_TOKEN}    # xoxb-...
    channels:
      main: sprint-main              # human ↔ brain
      coder: agent-coder             # brain → hands
      log: agent-log                 # autonomous run output

cron:
  - schedule: "*/10 * * * *"
    channel: agent-log
    task: >
      Post a one-line progress update to #agent-log using the status-report skill.
      Format: [autonomous run] <timestamp IST> — <N of M tasks complete>, CI: <status>.
