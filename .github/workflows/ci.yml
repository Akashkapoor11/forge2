name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Laravel API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, sqlite3, pdo_sqlite

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Copy env and generate key
        run: |
          cp .env.example .env || true
          php artisan key:generate

      - name: Prepare SQLite database
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test

  frontend-tests:
    name: React frontend build + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run
        continue-on-error: false

      - name: Build
        run: npm run build

  quality-gate:
    name: Quality gate (blocks merge to main)
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: echo "Backend and frontend checks passed — safe for human-approved merge to main."
