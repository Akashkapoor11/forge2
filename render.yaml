services:
  - type: web
    name: forge2-kanban-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/data/database.sqlite
      - key: FRONTEND_URL
        value: https://forge2-sooty.vercel.app
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
